<head>
<meta charset="UTF-8">

<title>Laberinto - Árele</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f9f9f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    font-family: sans-serif;
    min-height: 100vh;
    justify-content: center;
  }
  .maze-wrapper {
    position: relative;
    display: inline-block;
    cursor: crosshair;
  }
  #mazeImg {
    display: block;
    max-width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
  }
  #mazeCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    touch-action: none;
  }
  .tools {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  button {
    padding: 8px 18px;
    border: none;
    border-radius: 20px;
    font-size: 0.9rem;
    cursor: pointer;
    font-weight: bold;
  }
  #btnReset { background: #ef5350; color: white; }
  #btnBorrar { background: #90caf9; color: #333; }
  #btnBorrar.active { background: #1565c0; color: white; }
  .color-opt {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
  }
  .color-opt.selected { border-color: #333; }
  .grosor-label { font-size: 0.85rem; color: #555; }
  input[type=range] { width: 80px; }
</style>

<script>
const img = document.getElementById('mazeImg');
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let paths = [];
let currentPath = [];
let lineColor = '#e53935';
let lineWidth = 5;
let erasing = false;

function resizeCanvas() {
  const rect = img.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  redraw();
}

function coverRedLine() {
  // Cubre la línea roja vertical de escaneo (aprox. centro de la imagen)
  const x = canvas.width * 0.494;
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'white';
  ctx.fillRect(x - 4, 0, 8, canvas.height);
  ctx.restore();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  paths.forEach(path => {
    if (path.length < 2) return;
    ctx.beginPath();
    ctx.globalCompositeOperation = path[0].erase ? 'destination-out' : 'source-over';
    ctx.strokeStyle = path[0].erase ? 'rgba(0,0,0,1)' : (path[0].color || '#e53935');
    ctx.lineWidth = path[0].width || 5;
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
  });
  if (currentPath.length > 1) {
    ctx.beginPath();
    ctx.globalCompositeOperation = erasing ? 'destination-out' : 'source-over';
    ctx.strokeStyle = erasing ? 'rgba(0,0,0,1)' : lineColor;
    ctx.lineWidth = lineWidth;
    ctx.moveTo(currentPath[0].x, currentPath[0].y);
    for (let i = 1; i < currentPath.length; i++) ctx.lineTo(currentPath[i].x, currentPath[i].y);
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
  coverRedLine();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (canvas.width / rect.width),
    y: (src.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function startDraw(e) {
  drawing = true;
  currentPath = [{ ...getPos(e), color: lineColor, width: lineWidth, erase: erasing }];
}
function moveDraw(e) {
  if (!drawing) return;
  currentPath.push({ ...getPos(e), color: lineColor, width: lineWidth, erase: erasing });
  redraw();
}
function endDraw() {
  if (drawing && currentPath.length > 1) paths.push([...currentPath]);
  drawing = false; currentPath = []; redraw();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveDraw(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(); }, { passive: false });

document.getElementById('btnReset').addEventListener('click', () => {
  paths = []; currentPath = []; redraw();
});

const btnBorrar = document.getElementById('btnBorrar');
btnBorrar.addEventListener('click', () => {
  erasing = !erasing;
  btnBorrar.classList.toggle('active', erasing);
  canvas.style.cursor = erasing ? 'cell' : 'crosshair';
});

document.querySelectorAll('.color-opt').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    lineColor = el.dataset.color;
    erasing = false;
    btnBorrar.classList.remove('active');
    canvas.style.cursor = 'crosshair';
  });
});

document.getElementById('grosor').addEventListener('input', e => {
  lineWidth = parseInt(e.target.value);
});

window.addEventListener('resize', resizeCanvas);
img.addEventListener('load', resizeCanvas);
if (img.complete) resizeCanvas();
</script>
</body>
</html>
